version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      pip-patch:
        patterns:
          - "*"
        update-types:
          - "patch"
      pip-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
